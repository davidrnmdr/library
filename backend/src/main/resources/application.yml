spring:
  application:
    name: library

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/library}
    username: ${DATABASE_USERNAME:library}
    password: ${DATABASE_PASSWORD:library}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: ${SHOW_SQL:true}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

scalar:
  url: /v3/api-docs
  enabled: true

app:
  admin:
    username: ${DEFAULT_ADMIN_USERNAME:00000000000}
    password: ${DEFAULT_ADMIN_PASSWORD:admin}

