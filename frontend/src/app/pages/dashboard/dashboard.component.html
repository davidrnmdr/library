<div class="min-h-screen bg-gray-100">

  <header class="bg-gray-800 px-8 h-16 flex items-center justify-between sticky top-0 z-10 shadow-lg">
    <div class="flex items-center gap-3">
      <span class="text-2xl">📚</span>
      <h1 class="text-lg font-bold text-white">Biblioteca Comunitária</h1>
    </div>
    <div class="flex gap-3">
      <button
        class="bg-green-500 hover:bg-green-600 text-white rounded-lg px-4 py-2 text-sm font-semibold transition-colors cursor-pointer border-none"
        (click)="goToBorrowBook()"
      >
        📖 Emprestar
      </button>
      <button
        class="bg-red-500 hover:bg-red-600 text-white rounded-lg px-4 py-2 text-sm font-semibold transition-colors cursor-pointer border-none"
        (click)="goToAddBook()"
      >
        <span class="text-lg">+</span> Adicionar Livro
      </button>
    </div>
  </header>

  <main class="p-8 max-w-6xl mx-auto">
    <div class="flex items-center gap-3 mb-6">
      <h2 class="text-2xl font-bold text-gray-800">Acervo</h2>
      <span class="bg-blue-100 text-blue-700 text-xs font-semibold px-3 py-1 rounded-full">
        {{ books.length }} livros
      </span>
    </div>

    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
      <app-book-card *ngFor="let book of books" [book]="book" />
    </div>
  </main>

</div>
