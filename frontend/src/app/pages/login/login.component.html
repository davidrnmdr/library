<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-300 via-gray-400 to-gray-500">
  <div class="bg-white rounded-2xl p-10 w-full max-w-sm shadow-2xl">

    <div class="text-center mb-8">
      <span class="text-5xl">📚</span>
      <h1 class="text-xl font-bold text-gray-800 mt-3 mb-1">Biblioteca Comunitária</h1>
    </div>

    <form (ngSubmit)="onLogin()">

      <div class="flex flex-col gap-1.5 mb-4">
        <label for="cpf" class="text-xs font-semibold text-gray-600">CPF</label>
        <input
          id="cpf"
          type="text"
          [(ngModel)]="username"
          name="username"
          placeholder="000.000.000-00"
          class="px-4 py-3 border border-gray-200 rounded-lg text-sm outline-none focus:border-gray-400 transition-colors"
        />
      </div>

      <div class="flex flex-col gap-1.5 mb-6">
        <label for="password" class="text-xs font-semibold text-gray-600">Senha</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          placeholder="••••••••"
          class="px-4 py-3 border border-gray-200 rounded-lg text-sm outline-none focus:border-gray-400 transition-colors"
        />
      </div>

      <div class="text-center mb-3">
        <button type="button" class="text-xs text-gray-500 underline bg-transparent border-none cursor-pointer">
          Cadastre-se
        </button>
      </div>

      <p *ngIf="error" class="text-xs text-red-500 text-center mb-3">{{ error }}</p>

      <button
        type="submit"
        class="w-full py-3 bg-gray-400 hover:bg-gray-500 text-white rounded-lg text-sm font-semibold transition-colors cursor-pointer border-none"
      >
        Entrar
      </button>

    </form>
  </div>
</div>
