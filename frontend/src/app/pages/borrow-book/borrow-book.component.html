<div class="min-h-screen bg-gray-100">

  <header class="bg-gray-800 px-8 h-16 flex items-center sticky top-0 z-10 shadow-lg">
    <div class="flex items-center gap-3">
      <span class="text-2xl">📚</span>
      <h1 class="text-lg font-bold text-white">Biblioteca Comunitária</h1>
    </div>
  </header>

  <main class="p-8">

    <div class="flex items-center gap-2 mb-6">
      <button (click)="goBack()" class="text-gray-500 hover:text-gray-800 transition-colors cursor-pointer bg-transparent border-none text-sm">
        ← Voltar
      </button>
      <span class="text-gray-300">/</span>
      <h2 class="text-xl font-bold text-gray-800">Emprestar Livro</h2>
    </div>

    <div class="max-w-2xl mx-auto bg-white rounded-2xl shadow-md p-8">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-2">
            Usuário
          </label>
          <select
            formControlName="userId"
            class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm outline-none transition-colors focus:border-blue-500"
          >
            <option value="">Selecione um usuário</option>
            <option *ngFor="let user of users" [value]="user.id">
              {{ user.username }}
            </option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-2">
            Livro Disponível
          </label>
          <select
            formControlName="bookId"
            class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm outline-none transition-colors focus:border-blue-500"
          >
            <option value="">Selecione um livro</option>
            <option *ngFor="let book of books" [value]="book.id">
              {{ book.title }} - {{ book.author }} ({{ book.availableCopies }} disponíveis)
            </option>
          </select>
        </div>

        <div>
          <label class="block text-xs font-semibold text-gray-600 mb-2">
            Data de Devolução
          </label>
          <input
            type="date"
            formControlName="mustReturnAt"
            [min]="minDate"
            class="w-full px-4 py-3 border border-gray-200 rounded-lg text-sm outline-none transition-colors focus:border-blue-500"
          />
          <div *ngIf="form.get('mustReturnAt')?.hasError('pastDate') && form.get('mustReturnAt')?.touched" class="text-red-600 text-xs mt-1">
            A data deve ser futura
          </div>
        </div>

        <div class="flex gap-3 justify-end">
          <button type="button" (click)="goBack()"
            class="px-6 py-2.5 bg-gray-100 hover:bg-gray-200 text-gray-600 rounded-lg text-sm font-semibold transition-colors cursor-pointer border-none">
            Cancelar
          </button>
          <button type="submit" [disabled]="form.invalid"
            class="px-6 py-2.5 bg-gray-700 hover:bg-gray-800 disabled:bg-gray-300 text-white rounded-lg text-sm font-semibold transition-colors cursor-pointer border-none">
            Emprestar
          </button>
        </div>
      </form>
    </div>

  </main>

</div>
