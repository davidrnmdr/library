<div class="min-h-screen bg-gray-100">
  <app-header />

  <main class="p-8">

    <div class="flex items-center gap-2 mb-6">
      <p-button
        icon="pi pi-arrow-left"
        [text]="true"
        label="Voltar"
        severity="secondary"
        (onClick)="goBack()"
      />
      <span class="text-gray-300">/</span>
      <h2 class="text-xl font-bold text-gray-800">Emprestar Livro</h2>
    </div>

    <div class="max-w-2xl mx-auto">
      <p-card>
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-5">
          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold">Usuário</label>
            <p-select
              formControlName="userId"
              [options]="users"
              optionLabel="username"
              optionValue="id"
              placeholder="Selecione um usuário"
              styleClass="w-full"
            />
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-sm font-semibold">Livro Disponível</label>
            <p-select
              formControlName="bookId"
              [options]="avaliableBooks"
              optionLabel="displayName"
              optionValue="id"
              placeholder="Selecione um livro"
              styleClass="w-full"
            >
            </p-select>
          </div>

          <div class="bg-blue-50 border border-blue-200 rounded-lg p-4">
            <p class="text-sm text-blue-800">
              <i class="pi pi-info-circle mr-2"></i>
              <strong>Data de devolução:</strong> 7 dias após o empréstimo
            </p>
          </div>

          <div class="flex gap-3 justify-end">
            <p-button
              label="Cancelar"
              severity="secondary"
              [outlined]="true"
              (onClick)="goBack()"
            />
            <p-button
              label="Emprestar"
              type="submit"
              [disabled]="form.invalid"
              [raised]="true"
            />
          </div>
        </form>
      </p-card>
    </div>

  </main>

</div>
